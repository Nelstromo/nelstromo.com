<!DOCTYPE html>
<html lang="en">

<head>
    <title>RollDemBones</title>
    <link href="css/style.css" type="text/css" rel="stylesheet">
    <script src="js/script.js" defer></script>
</head>

<body>
    <div class="container">
        <h1>Test yer luck! Roll Dem Bones!</h1>

        <button id="rollDice">Roll Dem Bones!</button>

        <div class="dice-container" hidden>
            <div id="dice1" class="zero"></div>
            <div id="dice2" class="zero"></div>
        </div>

        <p id="resultMsg"></p>
        <p id="diceMsg"></p>
        <p id="doublesMsg"></p>
    </div>

    <!-- Hidden gif that will animate -->
    <img id="gif" src="img/miguel.gif" alt="miguel">

</body>

</html>
