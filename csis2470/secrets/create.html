

<!doctype html>
<html lang="en">

<head>
    <title>Nelstromo's Cosmic Wonders</title>
    <link rel="stylesheet" href="css/style.css" type="text/css">
    <script defer src="js/script.js"></script>
</head>

<body class="hero-gradient">
    <main>
        <div class="container-hide">
            <div class="page-header">
                <h2 class="page-title">Welcome</h1>
                    <p class="page-subtitle">Create an account below:</p>
            </div>

            <form action="https://stonecoldprofessor.com/2470-create-secrets.php" method="post" class="create-account-form" enctype="multipart/form-data">

                <div class="pass-label-box"><span class="requirement-hint-user">Must be 5 or more characters from the alphabet (no numbers or symbols)</span></div>
                <div class="input-group">
                    <input type="text" id="username" name="user" placeholder=" " required autocomplete="off" value="">
                    <label for="username">Username</label>
                </div>

                <div class="pass-label-box"><span class="requirement-hint-pass">Must contain 8+ characters and one or more numbers</span></div>
                <div class="input-group">
                    <input type="password" id="password" name="pass" placeholder=" " required autocomplete="new-password" value="">
                    <label for="password">Password</label>
                </div>

                <div class="pass-label-box"><span class="requirement-hint-conf">Must match password</span></div>
                <div class="input-group">
                    <input type="password" id="confirmPassword" name="verify" placeholder=" " required autocomplete="new-password" value="">
                    <label for="confirmPassword">Confirm Password</label>
                </div>

                <div class="input-group">
                    <label for="site"></label>
                    <input id="site" name="site" value="https://nelstromo.com/csis2470/secrets" hidden>

                </div>

                <br>
                <input type="submit" name="submit" class="submitbtn" value="Create account" disabled>
                <button type="submit" name="reset" class="resetbtn">Reset</button>
                <p class="account-msg">Already have an account? <a href=".">Login</a></p>
            </form>
        </div>
    </main>
</body>

</html>
